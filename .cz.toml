[tool.commitizen]
name = "cz_customize"
version = "0.0.0"
tag_format = "v$version"
version_files = ["pyproject.toml:version"]

[tool.commitizen.customize]
message_template = "{{change_type}}{% if scope %}({{scope}}){% endif %}: {{subject}}{% if body %}\n\n{{body}}{% endif %}{% if footer %}\n\n{{footer}}{% endif %}"
example = "вңЁ feat(api): add user registration endpoint"
schema = """
<type>(<scope>): <subject>
<BLANK LINE>
<body>
<BLANK LINE>
<footer>
"""
schema_pattern = "^(рҹҗӣ fix|вңЁ feat|рҹ“қ docs|рҹҺЁ style|вҷ»пёҸ refactor|вҡЎпёҸ perf|вң… test|рҹ”§ chore|рҹҸ—пёҸ build|рҹ‘· ci|вҸӘ revert|в¬ҶпёҸ upgrade|рҹ”Ҙ remove|рҹҺү init|рҹ”’ security)(\\(.+\\))?: .+"

[[tool.commitizen.customize.questions]]
type = "list"
name = "change_type"
choices = [
  { value = "вңЁ feat", name = "вңЁ feat:       ж–°еҠҹиғҪ" },
  { value = "рҹҗӣ fix", name = "рҹҗӣ fix:        дҝ®еӨҚ Bug" },
  { value = "рҹ“қ docs", name = "рҹ“қ docs:       ж–ҮжЎЈжӣҙж–°" },
  { value = "рҹҺЁ style", name = "рҹҺЁ style:      д»Јз Ғж јејҸеҢ–" },
  { value = "вҷ»пёҸ refactor", name = "вҷ»пёҸ  refactor:   д»Јз ҒйҮҚжһ„" },
  { value = "вҡЎпёҸ perf", name = "вҡЎпёҸ perf:       жҖ§иғҪдјҳеҢ–" },
  { value = "вң… test", name = "вң… test:       еўһеҠ жҲ–дҝ®ж”№жөӢиҜ•" },
  { value = "рҹ”§ chore", name = "рҹ”§ chore:      жӣҙж”№дҫқиө–гҖҒдҝ®ж”№й…ҚзҪ®зӯү" },
  { value = "рҹҸ—пёҸ build", name = "рҹҸ—пёҸ  build:      еҪұе“Қжһ„е»әзі»з»ҹжҲ–еӨ–йғЁдҫқиө–зҡ„жӣҙж”№" },
  { value = "рҹ‘· ci", name = "рҹ‘· ci:         CI/CD зӣёе…іжӣҙж”№" },
  { value = "вҸӘ revert", name = "вҸӘ revert:     еӣһйҖҖд№ӢеүҚзҡ„жҸҗдәӨ" },
  { value = "в¬ҶпёҸ upgrade", name = "в¬ҶпёҸ  upgrade:    еҚҮзә§дҫқиө–" },
  { value = "рҹ”Ҙ remove", name = "рҹ”Ҙ remove:     з§»йҷӨд»Јз ҒжҲ–ж–Үд»¶" },
  { value = "рҹҺү init", name = "рҹҺү init:       еҲқе§ӢжҸҗдәӨ" },
  { value = "рҹ”’ security", name = "рҹ”’ security:   е®үе…ЁжҖ§дҝ®еӨҚ" },
]
message = "иҜ·йҖүжӢ©жң¬ж¬ЎжҸҗдәӨзҡ„зұ»еһӢ:"

[[tool.commitizen.customize.questions]]
type = "input"
name = "scope"
message = "иҜҙжҳҺжң¬ж¬ЎжҸҗдәӨзҡ„еҪұе“ҚиҢғеӣҙ (еҸҜйҖүпјҢеҰӮ: auth, ui, api):"

[[tool.commitizen.customize.questions]]
type = "input"
name = "subject"
message = "иҜ·з”ЁдёҖеҸҘиҜқз®ҖзҹӯжҸҸиҝ°жң¬ж¬ЎжҸҗдәӨ (еҝ…еЎ«):"

[[tool.commitizen.customize.questions]]
type = "input"
name = "body"
message = "жҸҗдҫӣжӣҙиҜҰз»Ҷзҡ„жҸҗдәӨжҸҸиҝ° (еҸҜйҖүпјҢдҪҝз”Ё | иҝӣиЎҢжҚўиЎҢ):"

[[tool.commitizen.customize.questions]]
type = "input"
name = "footer"
